# Trigger deployment in cloud-infrastructure repo on push to main

name: Trigger Deploy

on:
  push:
    branches:
      - main

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TRIGGER_PAT }}
          repository: Reindeer-AI/cloud-infrastructure
          event-type: reindeer-coder-deploy
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref_name }}"}'
