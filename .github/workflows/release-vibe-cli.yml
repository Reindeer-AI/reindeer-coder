# Build and publish standalone vibe CLI binaries to GCS.
#
# Triggered by tags matching `vibe-v*` (e.g. `vibe-v0.1.0`).
# Produces self-contained binaries for macOS (arm64/x64) and Linux (x64)
# via `bun build --compile`, then uploads to the shared public release
# bucket under the vibe/ prefix.
#
# Supply chain hardening:
# - Action versions pinned to SHA (not mutable tags)
# - bun install --frozen-lockfile (reproducible dependency resolution)
# - SHA256 checksums generated and uploaded alongside each binary
# - install.sh verifies checksums before executing
# - Requires `vibe-v*` tag protection rule in repo settings
#
# Users install with:
#   curl -fsSL https://storage.googleapis.com/reindeer-release-external/vibe/install.sh | bash

name: "Vibe CLI: Build & Publish"

on:
  push:
    tags:
      - "vibe-v*"

permissions:
  contents: read
  id-token: write

env:
  BUCKET: reindeer-release-external
  PREFIX: vibe
  WIF_PROVIDER: projects/501901363747/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: gitlab-ci@reindeer-backend.iam.gserviceaccount.com

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binaries
        working-directory: cli
        run: |
          VERSION=${GITHUB_REF_NAME#vibe-v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mkdir -p dist
          for TARGET in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64; do
            SLUG=${TARGET#bun-}
            echo "Building $SLUG..."
            bun build src/main.ts \
              --compile \
              --define "VIBE_VERSION='$VERSION'" \
              --target=$TARGET \
              --outfile dist/$SLUG/vibe
          done

      - name: Generate checksums
        working-directory: cli
        run: |
          for DIR in darwin-arm64 darwin-x64 linux-x64; do
            (cd dist/$DIR && sha256sum vibe > vibe.sha256)
          done

      - name: Upload to GCS
        working-directory: cli
        run: |
          for DIR in darwin-arm64 darwin-x64 linux-x64; do
            gcloud storage cp dist/$DIR/vibe \
              gs://$BUCKET/$PREFIX/v$VERSION/$DIR/vibe
            gcloud storage cp dist/$DIR/vibe.sha256 \
              gs://$BUCKET/$PREFIX/v$VERSION/$DIR/vibe.sha256
          done

          echo "$VERSION" | gcloud storage cp - gs://$BUCKET/$PREFIX/latest
          gcloud storage cp install.sh gs://$BUCKET/$PREFIX/install.sh

      - name: Summary
        run: |
          {
            echo "## ✅ vibe CLI v${VERSION} published"
            echo ""
            echo "**Bucket:** \`gs://${BUCKET}/${PREFIX}/\`"
            echo ""
            echo "| Platform | SHA256 |"
            echo "|----------|--------|"
            for DIR in darwin-arm64 darwin-x64 linux-x64; do
              HASH=$(cat cli/dist/$DIR/vibe.sha256 | awk '{print $1}')
              echo "| $DIR | \`${HASH:0:16}…\` |"
            done
            echo ""
            echo "### Install"
            echo '```bash'
            echo "curl -fsSL https://storage.googleapis.com/${BUCKET}/${PREFIX}/install.sh | bash"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
