# Build validation pipeline
# Ensures the Docker image builds successfully on PRs

name: Build

on:
  pull_request:
  push:
    branches-ignore:
      - main

env:
  IMAGE_PROJECT: reindeer-backend
  REGISTRY: us-central1-docker.pkg.dev/reindeer-backend/containers
  IMAGE_NAME: reindeer-coder
  WIF_PROVIDER: projects/501901363747/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: gitlab-ci@reindeer-backend.iam.gserviceaccount.com

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ci/config/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VITE_AUTH0_DOMAIN=dev-0d0uyl2iqc17144b.us.auth0.com
            VITE_AUTH0_CLIENT_ID=i6QxH7zvtkkm5pD1iCS4mcIavVXhuOiZ
            VITE_AUTH0_AUDIENCE=https://vibe.reindeerlabs.ai
            VITE_AUTH0_ORG_ID=org_9WU9bq88J0jAPjmM
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_cache,mode=max
