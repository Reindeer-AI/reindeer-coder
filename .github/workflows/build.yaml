# Build validation pipeline
# Ensures the Docker image builds successfully on PRs

name: Build

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/config/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VITE_AUTH0_DOMAIN=dev-0d0uyl2iqc17144b.us.auth0.com
            VITE_AUTH0_CLIENT_ID=i6QxH7zvtkkm5pD1iCS4mcIavVXhuOiZ
            VITE_AUTH0_AUDIENCE=https://vibe.reindeerlabs.ai
            VITE_AUTH0_ORG_ID=org_9WU9bq88J0jAPjmM
          cache-from: type=gha
          cache-to: type=gha,mode=max
