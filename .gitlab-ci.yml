# GitLab CI/CD Pipeline Configuration for Reindeer Coder
# Uses hierarchical trigger-based architecture with sub-pipelines

stages:
  - triggers

# Lint Pipeline - Code quality checks using pre-commit hooks
lint-pipeline:
  stage: triggers
  trigger:
    include: ci/pipelines/lint.yaml
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_BRANCH !~ /(dev|main)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build Pipeline - Docker image build validation
build-reindeer-coder:
  stage: triggers
  trigger:
    include: ci/pipelines/build.yaml
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_BRANCH !~ /(dev|main)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Deployment Pipeline - Deployment to Cloud Run (only on merge to main)
deploy-reindeer-coder:
  stage: triggers
  trigger:
    include: ci/pipelines/deploy.yaml
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_BRANCH == "main"
